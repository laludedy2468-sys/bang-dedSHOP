<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Bang-DedSHOP</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:#f4f6f9;
}

.hero{
background:linear-gradient(135deg,#2563eb,#06b6d4);
color:white;
padding:50px;
border-radius:20px;
}

.product-card{
border:none;
border-radius:20px;
transition:.3s;
}

.product-card:hover{
transform:translateY(-8px);
}

</style>

</head>

<body>

<nav class="navbar navbar-dark bg-dark">

<div class="container">

<a class="navbar-brand">

🛒 Bang-DedSHOP

</a>

<a href="/logout" class="btn btn-danger">

Logout

</a>

</div>

</nav>

<div class="container mt-4">

<div class="hero shadow">

<h1>

Selamat Datang di Bang-DedSHOP 🚀

</h1>

<p>

Belanja Online Mudah dan Cepat

</p>

</div>

<h3 class="mt-5 mb-4">

🔥 Produk Tersedia

</h3>

<div class="row">

{% for p in products %}

<div class="col-md-4">

<div class="card product-card shadow mb-4">

<img
src="{{ url_for('static', filename='uploads/' + p.image) }}"
class="card-img-top"
style="height:250px; object-fit:cover;">
<div class="card-body">

<h5>{{ p.name }}</h5>

<p>

Stok : {{ p.stock }}

</p>

<h4 class="text-success">

Rp {{ p.price }}

</h4>

<a href="/add-cart/{{p.id}}" class="btn btn-primary w-100">
    Beli Sekarang
</a>

</div>

</div>

</div>

{% endfor %}

</div>

</div>

<footer class="bg-dark text-white text-center mt-5 p-4">

<h5>

Bang-DedSHOP

</h5>

<p>

© 2026 Universitas Hamzanwadi

</p>

</footer>

</body>

</html>
