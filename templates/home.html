<!DOCTYPE html>
<html>
<head>
    <title>Bang-DedSHOP</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand">🛒 Bang-DedSHOP</a>

        <div>
            <a href="/login" class="btn btn-primary">Login</a>
            <a href="/register" class="btn btn-success">Register</a>
        </div>
    </div>
</nav>

<div class="container mt-5">

    <h1>Selamat Datang di Bang-DedSHOP</h1>

    <p>
        Website Toko Online berbasis Flask.
    </p>

    <div class="row">

        {% for product in products %}

        <div class="col-md-4">

            <div class="card mb-3">

                <div class="card-body">

                    <h5>{{ product.name }}</h5>

                    <p>
                        Rp {{ product.price }}
                    </p>

                    <p>
                        Stok : {{ product.stock }}
                    </p>

                </div>

            </div>

        </div>

        {% endfor %}

    </div>

</div>

</body>
</html>
