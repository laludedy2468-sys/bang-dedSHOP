<!DOCTYPE html><html>
<head>
    <title>Data User</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light"><div class="container mt-4"><h2 class="mb-4">👥 Data User</h2>

<a href="/admin" class="btn btn-secondary mb-3">
    ← Kembali Dashboard
</a>

<div class="card shadow">
    <div class="card-body">

        <table class="table table-striped table-hover">

            <thead class="table-dark">
                <tr>
                    <th>ID</th>
                    <th>Username</th>
                    <th>Email</th>
                    <th>Role</th>
                    <th>Aksi</th>
                </tr>
            </thead>

            <tbody>
            {% for user in users %}
                <tr>
                    <td>{{ user.id }}</td>
                    <td>{{ user.username }}</td>
                    <td>{{ user.email }}</td>
                    <td>
                        <span class="badge bg-primary">
                            {{ user.role }}
                        </span>
                    </td>
                    <td>
                        <a href="/delete-user/{{user.id}}" class="btn btn-danger btn-sm">
                            Hapus
                        </a>
                    </td>
                </tr>
            {% endfor %}
            </tbody>

        </table>

    </div>
</div>

</div></body>
</html>
