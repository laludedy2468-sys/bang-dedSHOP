<!DOCTYPE html><html>
<head>
    <title>Laporan Sistem</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light"><div class="container mt-4"><h2 class="mb-4">📈 Laporan Sistem</h2>

<div class="row">

    <div class="col-md-4">
        <div class="card bg-primary text-white shadow">
            <div class="card-body text-center">
                <h5>Total User</h5>
                <h1>{{ total_user }}</h1>
            </div>
        </div>
    </div>

    <div class="col-md-4">
        <div class="card bg-success text-white shadow">
            <div class="card-body text-center">
                <h5>Total Produk</h5>
                <h1>{{ total_produk }}</h1>
            </div>
        </div>
    </div>

    <div class="col-md-4">
        <div class="card bg-warning shadow">
            <div class="card-body text-center">
                <h5>Total Pesanan</h5>
                <h1>{{ total_order }}</h1>
            </div>
        </div>
    </div>

</div>

<a href="/admin" class="btn btn-dark mt-4">
    ← Kembali Dashboard
</a>

</div></body>
</html>
