<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Bang-DedSHOP</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            min-height:100vh;
            background:linear-gradient(135deg,#0d6efd,#6610f2);
            display:flex;
            justify-content:center;
            align-items:center;
            padding:20px;
        }

        .register-box{
            width:100%;
            max-width:450px;
            background:white;
            padding:35px;
            border-radius:20px;
            box-shadow:0 15px 40px rgba(0,0,0,.2);
        }

        .logo{
            font-size:50px;
            text-align:center;
        }

        .title{
            text-align:center;
            font-weight:bold;
            margin-bottom:5px;
        }

        .subtitle{
            text-align:center;
            color:gray;
            margin-bottom:25px;
        }

        .form-control{
            border-radius:12px;
            padding:12px;
        }

        .btn-register{
            width:100%;
            border-radius:12px;
            padding:12px;
            font-weight:bold;
        }

        .login-link{
            text-align:center;
            margin-top:15px;
        }
    </style>
</head>
<body>

<div class="register-box">

    <div class="logo">🛒</div>

    <h2 class="title">Bang-DedSHOP</h2>

    <p class="subtitle">
        Buat akun baru untuk mulai berbelanja
    </p>

    <form method="POST">

        <div class="mb-3">
            <input type="text"
                   name="username"
                   class="form-control"
                   placeholder="Username"
                   required>
        </div>

        <div class="mb-3">
            <input type="email"
                   name="email"
                   class="form-control"
                   placeholder="Email"
                   required>
        </div>

        <div class="mb-3">
            <input type="password"
                   name="password"
                   class="form-control"
                   placeholder="Password"
                   required>
        </div>

        <button type="submit"
                class="btn btn-success btn-register">
            Daftar Sekarang
        </button>

    </form>

    <div class="login-link">
        Sudah punya akun?
        <a href="/login">Login di sini</a>
    </div>

</div>

</body>
</html>
