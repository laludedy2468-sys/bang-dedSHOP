<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Bang-DedSHOP</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:linear-gradient(135deg,#0d6efd,#6610f2);
            padding:20px;
        }

        .login-box{
            width:100%;
            max-width:420px;
            background:white;
            border-radius:20px;
            padding:35px;
            box-shadow:0 15px 40px rgba(0,0,0,.25);
        }

        .logo{
            font-size:55px;
            text-align:center;
            margin-bottom:10px;
        }

        .title{
            text-align:center;
            font-weight:bold;
            margin-bottom:5px;
        }

        .subtitle{
            text-align:center;
            color:#777;
            margin-bottom:25px;
        }

        .form-control{
            border-radius:12px;
            padding:12px;
        }

        .btn-login{
            width:100%;
            border-radius:12px;
            padding:12px;
            font-weight:bold;
        }

        .register-link{
            text-align:center;
            margin-top:15px;
        }

        .register-link a{
            text-decoration:none;
            font-weight:bold;
        }
    </style>
</head>
<body>

<div class="login-box">

    <div class="logo">🛒</div>

    <h2 class="title">Bang-DedSHOP</h2>

    <p class="subtitle">
        Masuk ke akun Anda
    </p>

    <form method="POST">

        <div class="mb-3">
            <input type="email"
                   name="email"
                   class="form-control"
                   placeholder="Masukkan Email"
                   required>
        </div>

        <div class="mb-3">
            <input type="password"
                   name="password"
                   class="form-control"
                   placeholder="Masukkan Password"
                   required>
        </div>

        <button type="submit"
                class="btn btn-primary btn-login">
            Login
        </button>

    </form>

    <div class="register-link">
        Belum punya akun?
        <a href="/register">Daftar Sekarang</a>
    </div>

</div>

</body>
</html>
