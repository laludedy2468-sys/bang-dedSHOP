<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-5">

<h2>Login</h2>

<form method="POST">

    <input
        type="email"
        name="email"
        class="form-control mb-3"
        placeholder="Email">

    <input
        type="password"
        name="password"
        class="form-control mb-3"
        placeholder="Password">

    <button class="btn btn-primary">
        Login
    </button>

</form>

</div>

</body>
</html>
